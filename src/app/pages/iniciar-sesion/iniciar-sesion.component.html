<div class="container flex-grow-1 d-flex justify-content-center align-items-center mt-5 pt-4">
    <div class="row justify-content-center w-100">
      <div class="col-md-6 col-lg-5">
        <div class="card shadow-lg rounded-4 p-4 text-center">

          <div class="mb-4">
            <img src="assets/img/ANAA.png" alt="ANAA" class="img-fluid" style="max-width: 80px;">
          </div>

          <h2 class="mb-4 fw-normal">Iniciar sesión</h2>

          <form action="#">
            <div class="mb-3">
              <input type="email" class="form-control form-control-lg" placeholder="Dirección de correo electrónico" required>
            </div>

            <div class="mb-3">
              <input type="password" class="form-control form-control-lg" placeholder="Contraseña" required>
            </div>

            <div class="form-check text-start mb-4">
              <input class="form-check-input" type="checkbox" id="rememberMe" checked>
              <label class="form-check-label" for="rememberMe">Acuérdate de mí</label>
            </div>

            <button type="submit" class="btn btn-login w-100 text-white">Iniciar sesión</button>
          </form>

          <a routerLink="/home" class="btn btn-back w-100 mt-3 text-white">
            Volver a la página principal
          </a>

        </div>
      </div>
    </div>
  </div>
