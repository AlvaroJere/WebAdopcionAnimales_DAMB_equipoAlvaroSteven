<div class="container my-5">
  <div class="row justify-content-center">
    <div class="col-md-8 shadow p-4 rounded bg-light">
      <h2 class="text-center mb-4">Contacta con Nosotros</h2>
      <form>
        <div class="mb-3">
          <label for="nombre" class="form-label">Nombre Completo</label>
          <input type="text" class="form-control" id="nombre" placeholder="Tu nombre...">
        </div>
        <div class="mb-3">
          <label for="email" class="form-label">Correo Electrónico</label>
          <input type="email" class="form-control" id="email" placeholder="nombre@ejemplo.com">
        </div>
        <div class="mb-3">
          <label for="asunto" class="form-label">Asunto</label>
          <select class="form-select" id="asunto">
            <option selected>Consulta general</option>
            <option value="1">Adopción</option>
            <option value="2">Voluntariado</option>
            <option value="3">Donaciones</option>
          </select>
        </div>
        <div class="mb-3">
          <label for="mensaje" class="form-label">Mensaje</label>
          <textarea class="form-control" id="mensaje" rows="4"></textarea>
        </div>
        <button type="submit" class="btn btn-primary w-100">Enviar Mensaje</button>
      </form>
    </div>
  </div>
</div>
